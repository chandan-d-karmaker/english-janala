<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- title and logo -->
    <title>English Janala</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- tailwind and daisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- custom css -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./tailwind.init.css">

</head>

<body class="poppins-font">

    <header>
        <div class="navbar bg-base-100 shadow-sm mb-12">
            <div class="navbar-start">
                <div class="dropdown">
                    <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h8m-8 6h16" />
                        </svg>
                    </div>
                    <ul tabindex="-1"
                        class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
                        <li>
                            <a href="" class=""><i class="fa-solid fa-circle-question""></i>FAQ</a>
                    </li>
                    <li>
                        <a href="" class=""><i class=" fa-solid fa-book-open"></i>Learn</a>
                        </li>
                        <li>
                            <a href="" class=""><i class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a>
                        </li>
                    </ul>
                </div>
                <a href="" class="flex items-center gap-1">
                    <span class="text-xl font-semibold leading-7 text-[#18181B]">English</span>
                    <img src="./assets/logo.png" alt="">
                    <span class="bangla-font text-xl">জানালা</span>
                </a>
            </div>
            <div class="navbar-end hidden lg:flex">
                <ul class="menu menu-horizontal px-1 space-x-4">
                    <li>
                        <a href="" class="btn btn-outline btn-primary"><i class="fa-solid fa-circle-question""></i>FAQ</a>
                    </li>
                    <li>
                        <a href="" class=" btn btn-outline btn-primary"><i class="fa-solid fa-book-open"></i>Learn</a>
                    </li>
                    <li>
                        <a href="" class="btn btn-outline btn-primary"><i
                                class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </header>

    <!-- banner section -->
    <section class="flex flex-col-reverse md:flex-row items-center w-4/5 mx-auto gap-10 justify-between">

        <!-- banner content -->
        <div class="flex-1 space-y-6 mr-0 md:mr-20 text-center md:text-left">
            <h2 class="text-4xl font-bold">
                <span class="text-[#00BCFF]">English</span> is Easy!!
            </h2>
            <p class="bangla-font text-2xl font-medium text-[#18181B]">আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি
                যদি নতুন হন অথবা আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে যাবে অন্য একটি Level এ
            </p>

            <fieldset class="fieldset w-xs">

                <input type="email" class="input" placeholder="Enter your Email" />

                <input type="password" class="input" placeholder="Password" />

                <button class="btn btn-primary mt-4">Login</button>
            </fieldset>
        </div>

        <!-- banner image -->
        <div class="flex-1">
            <img src="./assets/hero-student.png" alt="">
        </div>
    </section>

</body>

</html>
